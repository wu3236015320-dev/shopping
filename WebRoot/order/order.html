<#include "/common/head.html">
			<h2 class="page-title">订单确认</h2>
			<#if items ??>
				<#assign prices=0 />
				<div class="card mb-2">
					<div class="table-wrap">
						<table class="table">
							<thead>
								<tr>
									<th>商品</th>
									<th>单价</th>
									<th>数量</th>
								</tr>
							</thead>
							<tbody>
								<#list items as x>
								<tr>
									<td>${x.product.name}</td>
									<td>${x.price}</td>
									<td>${x.count}</td>
								</tr>
								<#assign prices = prices + x.price * x.count />
								</#list>
							</tbody>
						</table>
					</div>
					<p class="card-body"><strong>合计：¥${prices}</strong></p>
				</div>
				<div class="card card-body">
					<h3 class="page-title" style="font-size:1.1rem;">收货信息</h3>
					<#if user ??>
					<form action="/order/add" method="post">
						<div class="form-group">
							<label>收货人</label>
							<input type="text" name="username" class="form-control" value="${user.username}" style="max-width:320px;">
						</div>
						<div class="form-group">
							<label>电话</label>
							<input type="text" name="phone" class="form-control" value="${user.phone}" style="max-width:320px;">
						</div>
						<div class="form-group">
							<label>收货地址</label>
							<textarea name="addr" class="form-control">${user.addr!''}</textarea>
						</div>
						<button type="submit" class="btn btn-primary">提交订单</button>
					</form>
					</#if>
				</div>
			<#else>
				<p class="text-muted">请先从购物车选择商品后结算</p>
				<a href="/cart" class="btn btn-primary">去购物车</a>
			</#if>
<#include "/common/tail.html">
