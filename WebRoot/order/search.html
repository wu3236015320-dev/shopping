<#include "/common/head.html">
			<h2 class="page-title">订单搜索</h2>
			<div class="card card-body mb-2">
			<form action="/order/search" method="get">
				<div class="form-group">
					<label>订单号</label>
					<input type="text" name="orderid" class="form-control" placeholder="输入订单号">
				</div>
				<button type="submit" class="btn btn-primary">查找</button>
			</form>
		</div>
		<#if order ??>
		<div class="card">
			<div class="table-wrap">
				<table class="table">
					<thead>
						<tr>
							<th>订单号</th>
							<th>收货地址</th>
							<th>日期</th>
							<th>状态</th>
							<th></th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td>${order.id}</td>
							<td>${order.addr!''}</td>
							<td>${order.odate!''}</td>
							<td>
								<#if (order.status == 0)>未处理</#if>
								<#if (order.status == 1)>已处理</#if>
								<#if (order.status == 2)>废单</#if>
							</td>
							<td><button type="button" class="btn btn-outline btn-sm opt-order" data-orderid="${order.id}" data-status="${order.status}">订单处理</button></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
		</#if>
			<script src="/js/order.js"></script>
<#include "/common/tail.html">
