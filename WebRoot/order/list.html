<#include "/common/head.html">
			<h2 class="page-title">订单列表</h2>
			<div class="card">
			<div class="table-wrap">
				<table class="table">
					<thead>
						<tr>
							<th>订单号</th>
							<th>收货地址</th>
							<th>日期</th>
							<th>状态</th>
							<th></th>
							<th></th>
						</tr>
					</thead>
					<tbody>
						<#list oLists as o>
						<tr>
							<td>${o.id}</td>
							<td>${o.addr!''}</td>
							<td>${o.odate!''}</td>
							<td>
								<#if (o.status == 0)>未处理</#if>
								<#if (o.status == 1)>已处理</#if>
								<#if (o.status == 2)>废单</#if>
							</td>
							<td><button type="button" class="btn btn-outline btn-sm opt-order" data-orderid="${o.id}" data-status="${o.status}">订单处理</button></td>
							<td><a href="/order/detail/${o.id}">详情</a></td>
						</tr>
						</#list>
					</tbody>
				</table>
			</div>
			<div class="card-body">
				<a href="/order/list/${pageNo-1}" class="btn btn-outline btn-sm">上一页</a>
				<span class="text-muted">第 ${pageNo} 页 / 共 ${pageCount} 页</span>
				<a href="/order/list/${pageNo+1}" class="btn btn-outline btn-sm">下一页</a>
			</div>
			<script src="/js/order.js"></script>
<#include "/common/tail.html">
