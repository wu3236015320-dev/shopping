<#include "/common/admin_head.html">
			<h2 class="page-title">查找用户</h2>
		<div class="card card-body mb-2">
			<form action="/admin/searchUser" method="get">
				<div class="form-group">
					<label>用户名</label>
					<input type="text" name="username" class="form-control" placeholder="输入用户名">
				</div>
				<button type="submit" class="btn btn-primary">查找</button>
			</form>
		</div>
		<#if user ??>
		<div class="card">
			<div class="table-wrap">
				<table class="table">
					<thead>
						<tr>
							<th>ID</th>
							<th>用户名</th>
							<th>电话</th>
							<th>地址</th>
							<th>注册时间</th>
							<th></th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td>${user.id}</td>
							<td>${user.username}</td>
							<td>${user.phone!''}</td>
							<td>${user.addr!''}</td>
							<td>${user.rdate!''}</td>
							<td><a href="/user/delete/${user.id}" onclick="return confirm('确认删除？');">删除</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
		</#if>
<#include "/common/admin_tail.html">
