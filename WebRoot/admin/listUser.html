<#include "/common/admin_head.html">
			<h2 class="page-title">用户列表</h2>
			<div class="card">
			<div class="table-wrap">
				<table class="table">
					<thead>
						<tr>
							<th>ID</th>
							<th>用户名</th>
							<th>电话</th>
							<th>地址</th>
							<th>注册时间</th>
							<th></th>
						</tr>
					</thead>
					<tbody>
						<#list userPage.getList() as x>
						<tr>
							<td>${x.id}</td>
							<td>${x.username}</td>
							<td>${x.phone!''}</td>
							<td>${x.addr!''}</td>
							<td>${x.rdate!''}</td>
							<td><a href="/user/delete/${x.id}" onclick="return confirm('确认删除？');">删除</a></td>
						</tr>
						</#list>
					</tbody>
				</table>
			</div>
			<div class="card-body">
				<a href="/admin/listUser/${pageNo-1}" class="btn btn-outline btn-sm">上一页</a>
				<span class="text-muted">第 ${pageNo} 页 / 共 ${pageCount} 页</span>
				<a href="/admin/listUser/${pageNo+1}" class="btn btn-outline btn-sm">下一页</a>
			</div>
		</div>
<#include "/common/admin_tail.html">
