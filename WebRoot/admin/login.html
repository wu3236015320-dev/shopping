<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>管理后台 - 我的电商</title>
	<link rel="stylesheet" href="/css/theme.css">
	<link rel="stylesheet" href="/css/bootstrap.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
	<script src="/js/jquery.js"></script>
</head>
<body>
	<div class="site-wrap" style="padding: 48px 20px;">
		<div class="card card-body" style="max-width:360px;margin:0 auto;">
			<h2 class="page-title" style="margin-top:0;text-align:center;">管理后台</h2>
			<#if error??><p class="text-danger" style="text-align:center;">${error}</p></#if>
			<form action="/admin/login" method="post">
				<input type="hidden" name="login" value="ok">
				<div class="form-group">
					<label>用户名</label>
					<input type="text" name="username" class="form-control" required>
				</div>
				<div class="form-group">
					<label>密码</label>
					<input type="password" name="password" class="form-control" required>
				</div>
				<button type="submit" class="btn btn-primary" style="width:100%;">登录</button>
			</form>
		</div>
	</div>
</body>
</html>
