<#include "/common/head.html">
			<div class="card card-body" style="max-width:420px;">
				<h2 class="page-title" style="margin-top:0;">用户注册</h2>
				<form action="/user/register" method="post">
					<input type="hidden" name="reg" value="ok">
					<div class="form-group">
						<label>用户名</label>
						<input type="text" name="username" id="username" class="form-control" placeholder="6~18位字母数字下划线" required>
						<button type="button" class="btn btn-outline btn-sm mt-1" onclick="verify()">检测</button>
						<span id="div_uname_err_info" class="text-muted"></span>
					</div>
					<div class="form-group">
						<label>密码</label>
						<input type="password" name="password" class="form-control" required>
					</div>
					<div class="form-group">
						<label>确认密码</label>
						<input type="password" name="password1" class="form-control" required>
					</div>
					<div class="form-group">
						<label>电话</label>
						<input type="text" name="phone" class="form-control">
					</div>
					<div class="form-group">
						<label>地址</label>
						<input type="text" name="addr" class="form-control">
					</div>
					<button type="submit" class="btn btn-primary">注册</button>
				</form>
			</div>
			<script src="/js/my.js"></script>
			<script>
				function verify(){
					var name = $("#username").val();
					if(!name){ $("#div_uname_err_info").text("请输入用户名").addClass("red"); return; }
					$.get("/user/verify?name="+encodeURIComponent(name), function(r){
						$("#div_uname_err_info").removeClass("red").text(r==="yes" ? "可用" : "已被使用");
						if(r!=="yes") $("#div_uname_err_info").addClass("red");
					});
				}
			</script>
<#include "/common/tail.html">
