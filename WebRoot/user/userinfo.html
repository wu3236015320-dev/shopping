<#include "/common/head.html">
			<#if user ??>
			<div class="card card-body" style="max-width:520px;">
				<h2 class="page-title" style="margin-top:0;">用户信息</h2>
				<div class="form-group">
					<label>用户名</label>
					<input type="text" class="form-control" readonly value="${user.username}" style="max-width:320px;">
				</div>
				<div class="form-group">
					<label>电话</label>
					<input type="text" class="form-control" readonly value="${user.phone!''}" style="max-width:320px;">
				</div>
				<div class="form-group">
					<label>地址</label>
					<input type="text" class="form-control" readonly value="${user.addr!''}" style="max-width:320px;">
				</div>
			</div>
			</#if>
<#include "/common/tail.html">
