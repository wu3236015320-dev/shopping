<#include "/common/head.html">
			<#if user ??>
			<div class="card card-body" style="max-width:520px;">
				<h2 class="page-title" style="margin-top:0;">修改资料</h2>
				<form action="/user/update" method="post">
					<div class="form-group">
						<label>用户名</label>
						<input type="text" class="form-control" readonly value="${user.username}" style="max-width:320px;">
					</div>
					<div class="form-group">
						<label>电话</label>
						<input type="text" name="phone" class="form-control" value="${user.phone!''}" style="max-width:320px;">
					</div>
					<div class="form-group">
						<label>地址</label>
						<input type="text" name="addr" class="form-control" value="${user.addr!''}" style="max-width:320px;">
					</div>
					<button type="submit" class="btn btn-primary">保存</button>
				</form>
			</div>
			</#if>
<#include "/common/tail.html">
