	<script>
	(function(){
		var key = 'indexScrollY';
		document.querySelectorAll('a.pagination-link').forEach(function(a){
			a.addEventListener('click', function(){ sessionStorage.setItem(key, window.scrollY); });
		});
		var y = sessionStorage.getItem(key);
		if (y != null) {
			sessionStorage.removeItem(key);
			requestAnimationFrame(function(){ window.scrollTo(0, parseInt(y, 10)); });
		}
	})();
	</script>
